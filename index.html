<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurmīx - Bebida Funcional</title>
    <style>
        :root {
            --azul-oscuro: #023047;
            --crema-fondo: #FEF9EF;
            --amarillo: #FCCE41;
            --naranja-claro: #FFB703;
            --naranja-fuerte: #FB8500;
        }
        body {
            background-color: var(--crema-fondo);
            color: var(--azul-oscuro);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        h1 {
            color: var(--naranja-fuerte);
            font-size: 3rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            max-width: 600px;
        }
        .boton {
            background-color: var(--naranja-claro);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }
        .boton:hover {
            background-color: var(--naranja-fuerte);
        }
    </style>
</head>
<body>
    <h1>Kurm&#363;ix</h1>
    <p>Energía natural y bienestar con el poder de la cúrcuma y frutas peruanas.</p>
    <a href="#" class="boton">Próximamente</a>
</body>
</html>
